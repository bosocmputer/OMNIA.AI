<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="150" cy="150" r="148" fill="#1A1A1A"/>

  <!-- Ambient center glow -->
  <circle cx="150" cy="150" r="90" fill="#C9A84C" opacity="0.05" filter="url(#softglow)"/>

  <!-- Outer solid ring -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.85"/>
  <!-- Inner dashed ring -->
  <circle cx="150" cy="150" r="132" fill="none" stroke="#C9A84C" stroke-width="0.6" stroke-dasharray="4 6" opacity="0.45"/>

  <!-- Major tick marks (every 60deg) -->
  <g stroke="#C9A84C" stroke-width="1.4" opacity="0.8">
    <line x1="150" y1="10" x2="150" y2="26" transform="rotate(0,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="26" transform="rotate(60,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="26" transform="rotate(120,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="26" transform="rotate(180,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="26" transform="rotate(240,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="26" transform="rotate(300,150,150)"/>
  </g>
  <!-- Minor tick marks (every 15deg) -->
  <g stroke="#C9A84C" stroke-width="0.8" opacity="0.5">
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(15,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(30,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(45,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(75,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(90,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(105,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(135,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(150,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(165,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(195,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(210,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(225,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(255,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(270,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(285,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(315,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(330,150,150)"/>
    <line x1="150" y1="10" x2="150" y2="18" transform="rotate(345,150,150)"/>
  </g>

  <!-- Radial spokes from center to 6 triangle tips (subtle) -->
  <g stroke="#C9A84C" stroke-width="0.6" opacity="0.25">
    <line x1="150" y1="150" x2="150"   y2="42"/>
    <line x1="150" y1="150" x2="243.5" y2="96"/>
    <line x1="150" y1="150" x2="243.5" y2="204"/>
    <line x1="150" y1="150" x2="150"   y2="258"/>
    <line x1="150" y1="150" x2="56.5"  y2="204"/>
    <line x1="150" y1="150" x2="56.5"  y2="96"/>
  </g>

  <!-- Triangle 1 — pointing up -->
  <polygon points="150,42 243.5,204 56.5,204"
    fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.9" stroke-linejoin="round"/>

  <!-- Triangle 2 — pointing down (Star of David / Shatkona form) -->
  <polygon points="150,258 243.5,96 56.5,96"
    fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.9" stroke-linejoin="round"/>

  <!-- Inner hexagon (intersection zone) -->
  <polygon points="212.4,150 181.2,204 118.8,204 87.6,150 118.8,96 181.2,96"
    fill="none" stroke="#C9A84C" stroke-width="1.0" opacity="0.65"/>

  <!-- Circle circumscribing the inner hexagon -->
  <circle cx="150" cy="150" r="62.4" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.8"/>

  <!-- Innermost sacred circle -->
  <circle cx="150" cy="150" r="27" fill="none" stroke="#C9A84C" stroke-width="1.0" opacity="0.7"/>

  <!-- 6 golden dots at triangle tips (glowing) -->
  <circle cx="150"   cy="42"  r="3.5" fill="#C9A84C" filter="url(#glow)"/>
  <circle cx="243.5" cy="96"  r="3.5" fill="#C9A84C" filter="url(#glow)"/>
  <circle cx="243.5" cy="204" r="3.5" fill="#C9A84C" filter="url(#glow)"/>
  <circle cx="150"   cy="258" r="3.5" fill="#C9A84C" filter="url(#glow)"/>
  <circle cx="56.5"  cy="204" r="3.5" fill="#C9A84C" filter="url(#glow)"/>
  <circle cx="56.5"  cy="96"  r="3.5" fill="#C9A84C" filter="url(#glow)"/>

  <!-- 6 dots at inner hexagon vertices -->
  <circle cx="212.4" cy="150" r="2.2" fill="#C9A84C" opacity="0.75"/>
  <circle cx="181.2" cy="204" r="2.2" fill="#C9A84C" opacity="0.75"/>
  <circle cx="118.8" cy="204" r="2.2" fill="#C9A84C" opacity="0.75"/>
  <circle cx="87.6"  cy="150" r="2.2" fill="#C9A84C" opacity="0.75"/>
  <circle cx="118.8" cy="96"  r="2.2" fill="#C9A84C" opacity="0.75"/>
  <circle cx="181.2" cy="96"  r="2.2" fill="#C9A84C" opacity="0.75"/>

  <!-- Center bindu -->
  <circle cx="150" cy="150" r="12"  fill="#C9A84C" opacity="0.15" filter="url(#softglow)"/>
  <circle cx="150" cy="150" r="5.5" fill="#C9A84C" filter="url(#glow)"/>
  <circle cx="150" cy="150" r="2.5" fill="#1A1A1A"/>
</svg>
